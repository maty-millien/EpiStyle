name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Check formatting
        run: |
          bun run format
          if ! git diff --exit-code; then
            echo "::error::Formatting drift detected. Run 'bun run format' locally and commit the result."
            exit 1
          fi

      - name: Build
        run: bun run build
